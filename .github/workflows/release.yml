name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout full repo ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Generate checksum manifest (JSON) ──────────────────────────────
      - name: Generate checksum manifest
        run: |
          python3 - <<'EOF'
          import os, hashlib, json

          EXCLUDE_PREFIXES   = (".git", ".github")
          EXCLUDE_EXTENSIONS = (".zip",)

          def sha256(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(65536), b""):
                      h.update(chunk)
              return h.hexdigest()

          files = {}
          for root, dirs, filenames in os.walk("."):
              dirs[:] = [
                  d for d in dirs
                  if not any(
                      os.path.join(root, d).lstrip("./").startswith(p)
                      for p in EXCLUDE_PREFIXES
                  )
              ]
              for name in filenames:
                  full = os.path.join(root, name)
                  rel  = os.path.relpath(full, ".").replace("\\", "/")
                  if any(rel.startswith(p) for p in EXCLUDE_PREFIXES):
                      continue
                  if any(rel.endswith(e) for e in EXCLUDE_EXTENSIONS):
                      continue
                  if rel == "checksum.json":
                      continue
                  files[rel] = {
                      "sha256": sha256(full),
                      "size":   os.path.getsize(full)
                  }

          manifest = {
              "version": os.environ["TAG"],
              "commit":  os.environ["COMMIT"],
              "files":   dict(sorted(files.items()))
          }

          # ── First write (without checksum.json entry) ─────────────────────
          with open("checksum.json", "w") as f:
              json.dump(manifest, f, indent=2)

          # ── Hash the written file, inject into files, rewrite ─────────────
          checksum_hash = sha256("checksum.json")
          checksum_size = os.path.getsize("checksum.json")
          manifest["files"]["checksum.json"] = {
              "sha256": checksum_hash,
              "size":   checksum_size
          }
          manifest["files"] = dict(sorted(manifest["files"].items()))
          with open("checksum.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print(f"Manifest generated - {len(manifest['files'])} files indexed")
          print(f"checksum.json hash: {checksum_hash}")
          EOF
        env:
          TAG:    ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}

      # ── 3. Build the release zip (checksum.json is now included) ──────────
      - name: Build release archive
        run: |
          zip -r ${{ github.event.repository.name }}-${{ github.ref_name }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.DS_Store"

      # ── 4. Create GitHub release & upload assets ───────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   ${{ github.ref_name }}
          generate_release_notes: true
          draft:                  false
          prerelease:             false
          files: |
            ${{ github.event.repository.name }}-${{ github.ref_name }}.zip
            checksum.json