<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Console</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Rajdhani:wght@600;700&family=Barlow:wght@400;500&display=swap"/>
        <link rel="stylesheet" href="index.css"/>
    </head>
    <body>
        <div id="root"></div>
        <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <script type="text/babel">
            const LOG_DEBOUNCE = 3000;
                const LOG_LIMIT = 500;
                const GODOT_KEY = {
                    // Printable
                    'asciitilde': '~', 'quoteleft': '`', 'exclam': '!', 'quotedbl': '"',
                    'numbersign': '#', 'dollar': '$', 'percent': '%', 'ampersand': '&',
                    'apostrophe': "'", 'parenleft': '(', 'parenright': ')', 'asterisk': '*',
                    'plus': '+', 'comma': ',', 'minus': '-', 'period': '.', 'slash': '/',
                    'colon': ':', 'semicolon': ';', 'less': '<', 'equal': '=', 'greater': '>',
                    'question': '?', 'at': '@', 'bracketleft': '[', 'backslash': '\\',
                    'bracketright': ']', 'asciicircum': '^', 'underscore': '_',
                    'braceleft': '{', 'bar': '|', 'braceright': '}', 'space': ' ',

                    // Special
                    'escape': 'Escape', 'tab': 'Tab', 'backspace': 'Backspace',
                    'enter': 'Enter', 'delete': 'Delete', 'insert': 'Insert',
                    'home': 'Home', 'end': 'End', 'pageup': 'PageUp', 'pagedown': 'PageDown',
                    'left': 'ArrowLeft', 'right': 'ArrowRight', 'up': 'ArrowUp', 'down': 'ArrowDown',

                    // Function keys
                    'f1': 'F1', 'f2': 'F2', 'f3': 'F3', 'f4': 'F4', 'f5': 'F5', 'f6': 'F6',
                    'f7': 'F7', 'f8': 'F8', 'f9': 'F9', 'f10': 'F10', 'f11': 'F11', 'f12': 'F12',
                };

                function Godot_To_Key(key) {
                    if (!key) return null;
                    return GODOT_KEY[key.toLowerCase()] ?? key;
                }

                const TrashIcon = ({ size = 24, strokeWidth = 2, ...props }) => (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" {...props}>
                        <path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                );

                const RotateIcon = ({ size = 24, strokeWidth = 2, ...props }) => (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" {...props}>
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
                    </svg>
                );

                const make_key = (type, msg) => `${type}:${msg}`;
                const rgb_to_css = (rgb) => `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
                const rgb_to_css_alpha = (rgb, a) => `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${a})`;
                const rgb_lighten = (rgb, factor) => [
                    Math.round(rgb[0] + (255 - rgb[0]) * factor),
                    Math.round(rgb[1] + (255 - rgb[1]) * factor),
                    Math.round(rgb[2] + (255 - rgb[2]) * factor),
                ];

                const parse_lines = (message) => {
                    if (typeof message !== 'string') return [{ is_quote: false, text: String(message) }];
                    const raw = message.split('\n').map(line => {
                        const match = line.match(/^>\s?(.*)/);
                        if (match) return { is_quote: true, text: match[1] };
                        return { is_quote: false, text: line };
                    });
                    return raw.reduce((acc, line) => {
                        const prev = acc[acc.length - 1];
                        if (prev && prev.is_quote && line.is_quote) prev.text += '\n' + line.text;
                        else acc.push({ ...line });
                        return acc;
                    }, []);
                };

                const parse_segments = (text) => {
                    const segments = [];
                    const regex = /`([^`]+)`/g;
                    let last = 0, match;
                    while ((match = regex.exec(text)) !== null) {
                        if (match.index > last) segments.push({ is_code: false, text: text.slice(last, match.index) });
                        segments.push({ is_code: true, text: match[1] });
                        last = match.index + match[0].length;
                    }
                    if (last < text.length) segments.push({ is_code: false, text: text.slice(last) });
                    return segments;
                };

                const FilterButton = ({ type, label, count, is_active, on_click, color }) => (
                    <div
                        className={`filter ${is_active ? 'active' : ''}`}
                        data-type={type}
                        onClick={on_click}
                        style={color ? { color: rgb_to_css(color), backgroundColor: rgb_to_css_alpha(color, 0.1) } : {}}
                    >
                        <div className="filter-dot"></div>
                        {label}
                        {count > 0 && <span className="filter-count"> ({count})</span>}
                    </div>
                );

                const ActionButton = ({ icon: Icon, label, on_click }) => (
                    <button className="icon-btn icon-btn-labeled" onClick={on_click}>
                        <Icon size={12} strokeWidth={2} />
                        <span className="btn-label">{label}</span>
                    </button>
                );

                const LogText = ({ text, color }) => {
                    const segments = parse_segments(text);
                    const lightened = color ? rgb_lighten(color, 0.4) : null;
                    return segments.map((seg, i) =>
                        seg.is_code
                            ? <code key={i} className="log-code" style={lightened ? {
                                color: rgb_to_css(lightened),
                                background: rgb_to_css_alpha(lightened, 0.025),
                                borderColor: rgb_to_css_alpha(lightened, 0.3),
                            } : {}}>{seg.text}</code>
                            : <React.Fragment key={i}>{seg.text}</React.Fragment>
                    );
                };

                const LogRow = ({ type, badge, color, timestamp, message, repeat_count, is_hidden }) => {
                    const lines = parse_lines(message);
                    const is_multiline = lines.length > 1;
                    return (
                        <div
                            className={`log-row ${type} ${is_hidden ? 'hidden' : ''} ${is_multiline ? 'log-row-multiline' : ''}`}
                            style={{ color: rgb_to_css(rgb_lighten(color, 0.05)) }}
                        >
                            <span className="log-ts">{timestamp}</span>
                            <span className="log-level" style={{ color: rgb_to_css(color) }}>{badge}</span>
                            <span className="log-msg">
                                {lines.map((line, i) => (
                                    <span key={i} className={line.is_quote ? 'log-line log-quote' : 'log-line'}>
                                        <LogText text={line.text} color={color} />
                                    </span>
                                ))}
                            </span>
                            {repeat_count > 1 && <span className="badge visible">x{repeat_count}</span>}
                        </div>
                    );
                };
                
            const Console = () => {
                const { useState, useEffect, useRef, useCallback, useMemo } = React;
                const [logs, set_logs] = useState([]);
                const [seed_meta, set_seed_meta] = useState({});
                const [command_input, set_command_input] = useState('');
                const [is_dragging, set_is_dragging] = useState(false);
                const [command_history, set_command_history] = useState([]);
                const [history_index, set_history_index] = useState(-1);
                const [temp_input, set_temp_input] = useState('');
                const [position, set_position] = useState({ x: 0, y: 0 });
                const [bind_key, set_bind_key] = useState(null);
                const [size, set_size] = useState({ width: '800px', height: '360px' });

                const console_ref = useRef(null);
                const log_body_ref = useRef(null);
                const input_ref = useRef(null);
                const group_map_ref = useRef(new Map());
                const drag_offset_ref = useRef({ x: 0, y: 0 });

                const level_meta = useMemo(() => {
                    const map = { ...seed_meta };
                    logs.forEach(l => {
                        if (!map[l.type]) map[l.type] = {
                            label: l.label,
                            badge: l.badge,
                            color: l.color,
                            background: l.background,
                            priority: l.priority
                        };
                    });
                    return map;
                }, [logs, seed_meta]);

                const level_types = useMemo(() => (
                    [...new Set([...Object.keys(seed_meta), ...logs.map(l => l.type)])]
                        .sort((a, b) => (level_meta[a]?.priority ?? 99) - (level_meta[b]?.priority ?? 99))
                ), [logs, level_meta, seed_meta]);

                const [active_filters, set_active_filters] = useState(new Set());

                useEffect(() => {
                    set_active_filters(prev => {
                        const next = new Set(prev);
                        level_types.forEach(t => next.add(t));
                        return next;
                    });
                }, [level_types]);

                const log_counts = useMemo(() => {
                    const counts = Object.fromEntries(level_types.map(t => [t, 0]));
                    logs.forEach(log => { if (counts[log.type] !== undefined) counts[log.type]++; });
                    return counts;
                }, [logs, level_types]);

                const total_count = useMemo(() => Object.values(log_counts).reduce((s, c) => s + c, 0), [log_counts]);

                const scroll_bottom = useCallback(() => {
                    setTimeout(() => {
                        const el = log_body_ref.current;
                        if (el && el.scrollHeight - el.scrollTop - el.clientHeight < 6)
                            el.scrollTop = el.scrollHeight;
                    }, 0);
                }, []);

                const add_log = useCallback((entry, meta) => {
                    if (!entry.mode || !entry.message) return;
                    const resolved = meta?.[entry.mode];
                    if (!resolved) return;

                    const ts = entry.timestamp || new Date().toTimeString().slice(0, 8);
                    const now = Date.now();
                    const key = make_key(entry.mode, entry.message);
                    for (const [k, e] of group_map_ref.current)
                        if (now >= e.expires_at) group_map_ref.current.delete(k);

                    const existing = group_map_ref.current.get(key);
                    if (existing) {
                        existing.count++;
                        existing.expires_at = now + LOG_DEBOUNCE;
                        existing.timestamp = ts;
                        set_logs(prev => prev.map(log =>
                            log.id === existing.id ? { ...log, repeat_count: existing.count, timestamp: ts } : log
                        ));
                        scroll_bottom();
                    }
                    else {
                        const new_log = {
                            id: Date.now() + Math.random(),
                            type: entry.mode,
                            message: entry.message,
                            timestamp: ts,
                            repeat_count: 1
                        };
                        group_map_ref.current.set(key, { id: new_log.id, count: 1, expires_at: now + LOG_DEBOUNCE, timestamp: ts });
                        set_logs(prev => {
                            const updated = [...prev, new_log];
                            if (updated.length > LOG_LIMIT) return updated.slice(updated.length - LOG_LIMIT);
                            return updated;
                        });
                        setTimeout(() => { if (log_body_ref.current) log_body_ref.current.scrollTop = log_body_ref.current.scrollHeight; }, 0);
                    }
                }, [scroll_bottom]);

                const clear_logs = useCallback(() => {
                    set_logs([]);
                    group_map_ref.current.clear();
                    ipc.postMessage(JSON.stringify({ action: 'clear' }));
                }, []);

                const handle_message = useCallback((e) => {
                    const data = JSON.parse(e.detail);
                    if (data.action === 'init') { set_seed_meta(data.types); if (data.bind) set_bind_key(Godot_To_Key(data.bind)); }
                    else if (data.action === 'print') add_log(data, seed_meta);
                    else if (data.action === 'clear') clear_logs();
                }, [add_log, seed_meta]);

                const handle_command = useCallback((command) => {
                    const message = command.trim();
                    if (!message) return;
                    set_command_history(prev => prev[prev.length - 1] !== message ? [...prev, message] : prev);
                    set_history_index(-1);
                    set_temp_input('');
                    ipc.postMessage(JSON.stringify({ action: 'input', message }));
                }, []);

                const handle_key_down = useCallback((e) => {
                    if (bind_key && e.key === bind_key) {
                        e.preventDefault();
                        ipc.postMessage(JSON.stringify({ action: 'toggle' }));
                        return;
                    }
                    if (document.activeElement !== input_ref.current) return;
                    if (e.key === 'Enter' && command_input.trim()) {
                        handle_command(command_input);
                        set_command_input('');
                    }
                    else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (!command_history.length) return;
                        if (history_index === -1) set_temp_input(command_input);
                        const idx = history_index === -1 ? command_history.length - 1 : Math.max(0, history_index - 1);
                        set_history_index(idx);
                        set_command_input(command_history[idx]);
                    }
                    else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (history_index === -1) return;
                        const idx = history_index + 1;
                        if (idx >= command_history.length) { set_history_index(-1); set_command_input(temp_input); }
                        else { set_history_index(idx); set_command_input(command_history[idx]); }
                    }
                }, [command_input, command_history, history_index, temp_input, handle_command, bind_key]);

                const toggle_filter = useCallback((type) => {
                    if (type === 'all') {
                        set_active_filters(active_filters.size === level_types.length ? new Set() : new Set(level_types));
                    }
                    else {
                        set_active_filters(prev => {
                            const next = new Set(prev);
                            next.has(type) ? next.delete(type) : next.add(type);
                            return next;
                        });
                    }
                }, [level_types, active_filters.size]);

                const handle_mouse_down = useCallback((e) => {
                    if (e.target.closest('.icon-btn, .filter')) return;
                    e.preventDefault();
                    set_is_dragging(true);
                    const rect = console_ref.current.getBoundingClientRect();
                    drag_offset_ref.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
                }, []);

                const handle_mouse_move = useCallback((e) => {
                    if (!is_dragging) return;
                    set_position({ x: e.clientX - drag_offset_ref.current.x, y: e.clientY - drag_offset_ref.current.y });
                }, [is_dragging]);

                const handle_mouse_up = useCallback(() => set_is_dragging(false), []);

                const handle_resize_start = useCallback((e) => {
                    e.preventDefault(); e.stopPropagation();
                    const { clientX: sx, clientY: sy } = e;
                    const { width: sw, height: sh } = console_ref.current.getBoundingClientRect();
                    const on_move = (e) => set_size({ width: Math.max(400, sw + e.clientX - sx) + 'px', height: Math.max(260, sh + e.clientY - sy) + 'px' });
                    const on_end = () => { document.removeEventListener('mousemove', on_move); document.removeEventListener('mouseup', on_end); };
                    document.addEventListener('mousemove', on_move);
                    document.addEventListener('mouseup', on_end);
                }, []);

                useEffect(() => {
                    const prevent = (e) => e.preventDefault();
                    document.addEventListener('contextmenu', prevent);
                    return () => document.removeEventListener('contextmenu', prevent);
                }, []);

                useEffect(() => {
                    if (!is_dragging) return;
                    document.addEventListener('mousemove', handle_mouse_move);
                    document.addEventListener('mouseup', handle_mouse_up);
                    return () => { document.removeEventListener('mousemove', handle_mouse_move); document.removeEventListener('mouseup', handle_mouse_up); };
                }, [is_dragging, handle_mouse_move, handle_mouse_up]);

                useEffect(() => {
                    document.addEventListener('message', handle_message);
                    return () => document.removeEventListener('message', handle_message);
                }, [handle_message]);

                useEffect(() => {
                    document.addEventListener('keydown', handle_key_down);
                    return () => document.removeEventListener('keydown', handle_key_down);
                }, [handle_key_down]);

                useEffect(() => {
                    ipc.postMessage(JSON.stringify({ action: 'ready' }));
                }, []);

                return (
                    <div ref={console_ref} className="console" style={{ left: `${position.x}px`, top: `${position.y}px`, width: size.width, height: size.height }}>
                        <div className={`header ${is_dragging ? 'dragging' : ''}`} onMouseDown={handle_mouse_down}>
                            <span className="titlebar-label">Console</span>
                            <div className="header-divider"></div>
                            <div className="filters">
                                <FilterButton type="all" label="All" count={total_count} is_active={active_filters.size === level_types.length} on_click={() => toggle_filter('all')}/>
                                {level_types.map(type => (
                                    <FilterButton
                                        key={type}
                                        type={type}
                                        label={level_meta[type]?.label ?? type}
                                        count={log_counts[type]}
                                        is_active={active_filters.has(type)}
                                        on_click={() => toggle_filter(type)}
                                        color={level_meta[type]?.color ?? [220, 220, 220]}
                                    />
                                ))}
                            </div>
                            <div className="tabbar-actions">
                                <ActionButton icon={RotateIcon} label="Reset" on_click={() => set_position({ x: 0, y: 0 })}/>
                                <ActionButton icon={TrashIcon} label="Clear" on_click={clear_logs}/>
                            </div>
                        </div>

                        <div ref={log_body_ref} className="log-body">
                            {logs.map(log => {
                                const meta = level_meta[log.type] ?? {};
                                return (
                                    <LogRow
                                        key={log.id}
                                        type={log.type}
                                        badge={meta.badge}
                                        color={meta.color}
                                        background={meta.background}
                                        timestamp={log.timestamp}
                                        message={log.message}
                                        repeat_count={log.repeat_count}
                                        is_hidden={!active_filters.has(log.type)}
                                    />
                                );
                            })}
                        </div>

                        <div className="input-bar">
                            <span className="input-prompt">❯</span>
                            <input ref={input_ref} className="input-field" value={command_input} onChange={(e) => set_command_input(e.target.value)} placeholder="Enter command or expression..." autoComplete="off" spellCheck="false"/>
                        </div>

                        <div className="resize-handle" onMouseDown={handle_resize_start}><span></span></div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<Console/>);
        </script>
    </body>
</html>
